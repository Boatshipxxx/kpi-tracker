<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note — BOATship Notes</title>
<meta id="page-desc" name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Mono:wght@400;500;700&family=Silkscreen&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<div class="noise-overlay"></div>
<div class="float-wrapper" aria-hidden="true">
  <img src="../images/logo.jpg" alt="" class="float-inner-img">
</div>

<header class="top-nav">
  <a href="../" class="nav-logo-wrapper">
    <img src="../images/logo.jpg" alt="BOATship" class="company-logo">
    <span>BOATship</span>
  </a>
  <nav class="nav-links">
    <a href="../works">Works</a>
    <a href="../magazine">Magazines</a>
    <a href="../notes">Notes</a>
    <a href="../about">Company</a>
  </nav>
  <button class="menu-toggle" id="menuToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="mobile-menu" id="mobileMenu">
  <a href="../" onclick="closeMenu()">Home</a>
  <a href="../works" onclick="closeMenu()">Works</a>
  <a href="../magazine" onclick="closeMenu()">Magazines</a>
  <a href="../notes" onclick="closeMenu()">Notes</a>
  <a href="../about" onclick="closeMenu()">Company</a>
</div>

<div id="note-root"></div>

<section class="newsletter-section" id="newsletter">
  <h2>Studio<br>Updates</h2>
  <p class="sub-text">新着の制作事例やMagazinesをメールでお届け。</p>
  <form action="https://formspree.io/f/xvzlyrdk" method="POST" class="newsletter-form">
    <input type="email" name="email" class="newsletter-input" placeholder="your@email.com" required>
    <button type="submit" class="newsletter-btn">SUBSCRIBE</button>
  </form>
  <p class="newsletter-note">* スパムは送りません。いつでも解除できます。</p>
</section>

<footer>
  <div class="nav-logo-wrapper">
    <img src="../images/logo.jpg" alt="BOATship" class="company-logo" style="height:30px;width:30px;">
    <span>© 2026 BOATship — Design Studio</span>
  </div>
  <div class="nav-links">
    <a href="../works">Works</a>
    <a href="../magazine">Magazines</a>
    <a href="../about">Company</a>
  </div>
</footer>

<script src="notes.js"></script>
<script src="../assets/js/main.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var note = NOTES.find(function (n) { return n.id === id; });

  if (!note) {
    window.location.href = '../notes';
    return;
  }

  document.title = note.title + ' — BOATship Notes';
  document.getElementById('page-desc').setAttribute('content', note.excerpt);

  var root = document.getElementById('note-root');
  root.innerHTML =
    '<a href="../notes" class="back-to-mag">← Notes に戻る</a>' +
    '<section class="article-page-hero">' +
      '<span class="article-category-badge">' + note.category + '</span>' +
      '<h1 class="article-page-title">' + note.title + '</h1>' +
      '<div class="article-meta">' +
        '<span>' + note.date + '</span>' +
        '<span>' + note.readTime + ' min read</span>' +
        '<span>' + note.num + '</span>' +
      '</div>' +
    '</section>' +
    '<div class="article-hero-wrap">' +
      '<img src="' + note.image + '" alt="' + note.title + '" class="article-hero-img">' +
    '</div>' +
    '<article class="article-body">' + note.body + '</article>' +
    '<a href="../notes" class="back-to-mag" style="margin-bottom:4rem;">← Notes に戻る</a>';
})();
</script>
</body>
</html>
