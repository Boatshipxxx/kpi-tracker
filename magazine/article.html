<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var article = ARTICLES.find(function (a) { return a.id === id; });

  if (!article) {
    window.location.href = '../magazine';
    return;
  }

  // 旧URL(?id=)は静的生成された新URL(/magazine/<slug>/)へ恒久的に誘導する。
  // 静的HTMLのため301は返せず、canonical + meta refresh + JSリダイレクトで代替。
  if (article.slug) {
    var newUrl = new URL(article.slug + '/', window.location.href).href;
    var canon = document.createElement('link');
    canon.rel = 'canonical';
    canon.href = newUrl;
    document.head.appendChild(canon);
    var refresh = document.createElement('meta');
    refresh.httpEquiv = 'refresh';
    refresh.content = '0;url=' + newUrl;
    document.head.appendChild(refresh);
    window.location.replace(newUrl);
    return;
  }

  document.title = article.title + ' — BOATship Magazines';
  document.getElementById('page-desc').setAttribute('content', article.excerpt);

  // Open Graph / Twitter card meta (resolved to absolute URLs for crawlers)
  var ogImage = new URL(article.og || article.hero, window.location.href).href;
  var setMeta = function (elId, value) {
    var el = document.getElementById(elId);
    if (el) { el.setAttribute('content', value); }
  };
  setMeta('og-title', article.title + ' — BOATship Magazines');
  setMeta('og-desc', article.excerpt);
  setMeta('og-image', ogImage);
  setMeta('og-url', window.location.href);
  setMeta('tw-title', article.title + ' — BOATship Magazines');
  setMeta('tw-desc', article.excerpt);
  setMeta('tw-image', ogImage);

  var isTech = article.category && article.category.toLowerCase() === 'tech';
  var isBrutalism = article.id === '03';

  var heroBlock;
  if (isTech) {
    heroBlock = '<div class="article-tech-hero-block"><div class="article-tech-hero-inner"><span class="article-tech-hero-word">TECH</span></div></div>';
  } else if (isBrutalism) {
    heroBlock = '<div id="bru-slot"></div>';
  } else {
    heroBlock = '<div class="article-hero-wrap"><img src="' + article.hero + '" alt="' + article.title + '" class="article-hero-img"></div>';
  }

  var root = document.getElementById('article-root');
  root.innerHTML =
    '<a href="../magazine" class="back-to-mag">← Magazines に戻る</a>' +
    '<section class="article-page-hero">' +
      '<span class="article-category-badge">' + article.category + '</span>' +
      '<h1 class="article-page-title">' + article.title + '</h1>' +
      '<div class="article-meta">' +
        '<span>' + article.date + '</span>' +
        '<span>' + article.readTime + ' min read</span>' +
        '<span>' + article.num + '</span>' +
      '</div>' +
    '</section>' +
    heroBlock +
    '<article class="article-body">' + article.body + '</article>' +
    '<div id="article-end" style="height:1px;" data-article-id="' + article.id + '" data-read-time="' + article.readTime + '"></div>' +
    '<a href="../magazine" class="back-to-mag" style="margin-bottom:4rem;">← Magazines に戻る</a>';

  if (isBrutalism) {
    var tpl = document.getElementById('bru03');
    var slot = document.getElementById('bru-slot');
    if (tpl && slot) {
      slot.appendChild(document.importNode(tpl.content, true));
      function scaleBru() {
        var frame = document.getElementById('bruFrame');
        var inner = document.getElementById('bruScale');
        if (frame && inner) {
          inner.style.transform = 'scale(' + (frame.clientWidth / 1200) + ')';
        }
      }
      scaleBru();
      window.addEventListener('resize', scaleBru);
    }
  }
})();
</script>
