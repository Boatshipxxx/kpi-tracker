# BOATship — 記事静的HTML + sitemap.xml / robots.txt 自動再生成
#
# main の記事データ(notes/notes.js・magazine/articles.js)やテンプレート・
# 生成スクリプトが更新されたら、記事の静的ページ(/notes/<slug>/ 等)と
# sitemap.xml / robots.txt を再生成し、差分があれば main にコミットする。
# ホスティングは Vercel のため、生成物をコミットすればそのまま配信される。
#
# 手動実行: Actions タブ → "Build articles & sitemap" → Run workflow

name: Build articles & sitemap

on:
  push:
    branches: [main]
    paths:
      - "notes/notes.js"
      - "magazine/articles.js"
      - "templates/**"
      - "scripts/build-articles.js"
      - "scripts/generate-sitemap.js"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build article pages
        run: node scripts/build-articles.js

      - name: Generate sitemap.xml / robots.txt
        run: node scripts/generate-sitemap.js

      - name: Commit if changed
        run: |
          git add -A notes magazine sitemap.xml robots.txt
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: rebuild article pages / sitemap"
            git push
          else
            echo "生成物は最新です。変更なし。"
          fi
